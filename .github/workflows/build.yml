name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Nexus is resolved via JitPack from github.com/BadgersMC/Nexus — public,
      # no auth required. Both test and shadowJar can run on CI now.
      - name: Test + shadowJar
        run: ./gradlew test shadowJar --no-daemon --stacktrace

      - name: Upload shadowJar
        uses: actions/upload-artifact@v4
        with:
          name: EnthusiaGiveaway
          path: build/libs/*.jar
          if-no-files-found: error
