name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # NOTE: shadowJar is intentionally omitted here because this plugin shades
      # net.badgersmc:nexus-core / nexus-paper, which are resolved from mavenLocal
      # and are not published to a public repository. CI cannot resolve them, so
      # we run tests only. Local devs verify `./gradlew test shadowJar` before push.
      - name: Run tests
        run: ./gradlew test --no-daemon --stacktrace
