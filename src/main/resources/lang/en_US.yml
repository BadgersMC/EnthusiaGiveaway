    schedule: "<green>Schedule New</green>"
    templates: "<aqua>Start from Template</aqua>"
    no_giveaways: "<gray>No scheduled or active giveaways</gray>"
    state_active: "<green>Active</green>"
    state_scheduled: "<gray>Scheduled</gray>"
