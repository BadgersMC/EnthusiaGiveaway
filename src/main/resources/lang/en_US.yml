  template_started: "<green>Started template giveaway: <name></green>"
  template_not_found: "<red>Template not found: <name></red>"
  template_invalid: "<red>Invalid template <name>: <reason></red>"
  template_console_only: "<red>'template' subcommand is for console only.</red>"

celebrate:
  announcement: "<gold>🎉 <player> won <title>! 🎉</gold>"
