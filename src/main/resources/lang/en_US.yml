  player:
    title: "Active Giveaways"
    no_active: "<gray>No active giveaways</gray>"
    time_remaining: "<yellow>Time remaining: <time></yellow>"
    entries: "<gray>Entries: <entries></gray>"
    already_entered: "<green>✓ Entered</green>"
    click_to_enter: "<aqua>Click to enter</aqua>"
    entered_bar: "<green>Entered: <title></green>"
    already_entered_bar: "<gray>You are already entered.</gray>"
